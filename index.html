*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:#06030e;color:#f0d0ff;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#c44dff44;border-radius:4px}
input,textarea,select{font-family:inherit;outline:none;-webkit-appearance:none}
button{font-family:inherit;cursor:pointer;-webkit-appearance:none;border:none}

/* Layout */
.app{min-height:100vh;background:#06030e;background-image:radial-gradient(ellipse at 10% 0%,#1e0835 0%,transparent 55%);padding-bottom:80px}
.header{padding:20px 16px 0;text-align:center}
.eyebrow{font-size:9px;letter-spacing:5px;color:#c44dff44;text-transform:uppercase;margin-bottom:4px}
.logo{font-family:Georgia,serif;font-weight:700;font-size:26px;margin:0 0 4px;letter-spacing:-1px;background:linear-gradient(135deg,#ff9de2,#c44dff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.badges{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:10px}
.badge{font-size:9px;padding:2px 8px;border-radius:8px}
.badge-purple{background:#c44dff15;color:#c44dff}
.badge-red{background:#ff444410;color:#ff4444}
.badge-green{background:#44ff8810;color:#44ff88}

/* Nav */
.nav{display:flex;margin:10px 16px 12px;background:#0d0816;border-radius:12px;padding:3px}
.nav-btn{flex:1;padding:7px 2px;border:none;border-radius:10px;font-size:10px;transition:all .2s;background:transparent;color:#444}
.nav-btn.active{background:linear-gradient(135deg,#2a0a4a,#1a0530);color:#ff9de2}

/* Content */
.content{padding:0 16px}

/* Cards */
.card{padding:14px 16px;border-radius:14px;margin-bottom:12px;background:linear-gradient(135deg,#1a0d2e,#0f0818);border:1px solid #c44dff22}
.card-title{font-size:9px;letter-spacing:3px;color:#c44dff66;text-transform:uppercase;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}

/* Finance grid */
.fin-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.fin-cell{padding:8px 10px;border-radius:10px;background:#ffffff05;border:1px solid #ffffff08}
.fin-cell.debt{border-color:#ff444422}
.fin-label{font-size:9px;color:#444;margin-bottom:2px}
.fin-val{font-size:15px;color:#ff9de2;font-family:Georgia,serif}
.fin-val.debt{color:#ff6666}

/* Progress bar */
.prog-wrap{margin-bottom:8px}
.prog-header{display:flex;justify-content:space-between;font-size:9px;color:#444;margin-bottom:2px}
.prog-pct{color:#c44dff}
.prog-track{height:4px;background:#1a0d2e;border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#c44dff,#ff6b9d);border-radius:4px;transition:width .6s ease}

/* Finance edit inputs */
.fin-edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fin-edit-item label{font-size:9px;color:#555;display:block;margin-bottom:3px}
.fin-edit-item input{width:100%;background:#1a0d2e;border:1px solid #c44dff33;border-radius:6px;padding:5px 8px;color:#ff9de2;font-size:13px}

/* Audit */
.audit-row{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.audit-count{font-family:Georgia,serif;font-size:22px;color:#ff9de2}
.audit-btns{display:flex;gap:6px}
.audit-btn{width:32px;height:32px;border-radius:50%;border:none;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center}
.audit-btn.minus{background:#ff444420;color:#ff4444}
.audit-btn.plus{background:#c44dff20;color:#c44dff}

/* Milestone grid */
.milestone-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-top:8px}
.milestone-dot{height:24px;border-radius:6px;border:1px solid #c44dff22;background:#1a0d2e;display:flex;align-items:center;justify-content:center;font-size:9px;color:#333;cursor:pointer;transition:all .2s}
.milestone-dot.done{background:linear-gradient(135deg,#ff6b9d,#c44dff);border-color:transparent;color:#fff}

/* Schedule */
.sched-item{padding:12px 14px;border-radius:12px;margin-bottom:8px;background:#0a0610;border:1px solid #ffffff08}
.sched-item.first{background:linear-gradient(135deg,#1a0535,#0d0220);border-color:#ff6b9d33}
.sched-day{font-size:11px;color:#555;margin-bottom:3px}
.sched-item.first .sched-day{color:#ff6b9d}
.sched-detail{font-size:13px;color:#e0c0f8}

/* Category */
.cat-header{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:12px;cursor:pointer;background:#0d0816;border:1px solid #ffffff08;margin-bottom:0;user-select:none}
.cat-label{flex:1;font-size:13px;color:#c44dff;font-family:Georgia,serif}
.cat-done-count{font-size:9px;color:#444}
.cat-chevron{color:#333;font-size:14px}
.cat-body{margin-top:2px;margin-bottom:10px}

.p-urgent{background:#ff444415;border-color:#ff444444}
.p-high{background:#ff6b9d15;border-color:#ff6b9d44}
.p-med{background:#c44dff15;border-color:#c44dff33}
.p-low{background:#ffffff06;border-color:#ffffff12}
.dot-urgent{color:#ff4444}
.dot-high{color:#ff6b9d}
.dot-med{color:#c44dff}
.dot-low{color:#555}

/* Task row */
.task-row{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-radius:10px;margin-bottom:5px;border:1px solid}
.task-check{width:18px;height:18px;border-radius:50%;flex-shrink:0;margin-top:1px;cursor:pointer;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;transition:all .2s}

.task-text{flex:1;font-size:12px;line-height:1.5}
.task-text.done-text{color:#333;text-decoration:line-through}
.task-meta{display:flex;flex-direction:column;gap:3px;flex-shrink:0}
.task-priority{font-size:8px;padding:1px 5px;border-radius:6px;text-transform:uppercase;font-weight:700}
.task-del{font-size:8px;padding:1px 5px;border-radius:6px;background:#ff444411;color:#ff4444;border:none;cursor:pointer}

/* Add task */

.add-input{width:100%;background:#1a0d2e;border:1px solid #c44dff22;border-radius:6px;padding:6px 8px;color:#f0d0ff;font-size:12px;margin-bottom:6px}
.priority-row{display:flex;gap:5px;margin-bottom:6px}
.pr-btn{flex:1;padding:4px;border-radius:6px;border:1px solid;font-size:9px;text-transform:uppercase;background:transparent}

.pr-btn.selected-high{background:#ff6b9d20;border-color:#ff6b9d;color:#ff6b9d}
.pr-btn.selected-med{background:#c44dff20;border-color:#c44dff;color:#c44dff}
.pr-btn.selected-low{background:#ffffff10;border-color:#555;color:#555}
.pr-btn.unselected{border-color:#ffffff15;color:#333}

.btn-add{flex:1;padding:7px;border-radius:8px;background:linear-gradient(135deg,#ff6b9d,#c44dff);color:#fff;font-size:11px;font-weight:700}
.btn-cancel{flex:1;padding:7px;border-radius:8px;border:1px solid #ffffff15;background:transparent;color:#555;font-size:11px}
.btn-add-task{width:100%;padding:7px;border-radius:8px;border:1px dashed #ffffff10;background:transparent;color:#333;font-size:11px;margin-bottom:3px}

.confirm-row{display:flex;gap:8px}
.btn-confirm{flex:1;padding:10px;border-radius:12px;background:linear-gradient(135deg,#ff6b9d,#c44dff);color:#fff;font-size:12px;font-weight:700}
.btn-deny{flex:1;padding:10px;border-radius:12px;border:1px solid #ffffff15;background:transparent;color:#555;font-size:12px}
.show-done-btn{background:none;border:1px solid #ffffff10;color:#333;font-size:10px;padding:5px 16px;border-radius:10px;display:block;margin:8px auto 0}

/* Done view */
.done-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;margin-bottom:5px;background:#0a0610;border:1px solid #ffffff05;cursor:pointer}
.done-tick{width:16px;height:16px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#ff6b9d,#c44dff);display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff}

.saved-toast.show{opacity:1}

.edit-btn{background:none;border:1px solid #ffffff15;color:#555;font-size:10px;padding:2px 10px;border-radius:10px;cursor:pointer}

// ── STORAGE ───────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'blazedbrat_cmd_v1';

function loadUserData() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { done: {}, finances: {} };
    return JSON.parse(raw);
  } catch(e) { return { done: {}, finances: {} }; }
}

function saveUserData(ud) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(ud)); } catch(e) {}
  showSaved();
}

var userData = loadUserData();
var finances = Object.assign({}, INIT_FINANCES, userData.finances || {});
// Goals always from code
finances.savingsGoal = INIT_FINANCES.savingsGoal;
finances.chequingGoal = INIT_FINANCES.chequingGoal;
finances.businessGoal = INIT_FINANCES.businessGoal;

function persistAll() {
  userData.done = userData.done || {};
  userData.finances = {
    business: finances.business,
    businessSavings: finances.businessSavings,
    tdSavings: finances.tdSavings,
    tdChequing: finances.tdChequing,
    tdCredit: finances.tdCredit,
    owedBoyfriend: finances.owedBoyfriend,
    femdomAudit: finances.femdomAudit,
    planMilestones: finances.planMilestones
  };
  saveUserData(userData);
}

// ── STATE ─────────────────────────────────────────────────────────────────────
var currentView = 'all';
var collapsed = {};
var addingTo = null;
var newTaskText = '';
var newTaskPriority = 'med';
var showDone = false;
var editingFin = false;
var confirmingReset = false;

// Extra tasks added by user (stored in userData)
userData.extraTasks = userData.extraTasks || {};

// ── HELPERS ───────────────────────────────────────────────────────────────────
var P = {
  urgent: { cls:'p-urgent', dot:'dot-urgent', label:'URGENT' },
  high:   { cls:'p-high',   dot:'dot-high',   label:'HIGH' },
  med:    { cls:'p-med',    dot:'dot-med',     label:'MED' },
  low:    { cls:'p-low',    dot:'dot-low',     label:'LOW' },
};

function allTasks() {
  var result = [];
  var keys = Object.keys(CATEGORIES);
  for (var i = 0; i < keys.length; i++) {
    var catKey = keys[i];
    var section = CATEGORIES[catKey];
    var tasks = section.tasks.slice();
    var extra = userData.extraTasks[catKey] || [];
    for (var j = 0; j < extra.length; j++) tasks.push(extra[j]);
    for (var j = 0; j < tasks.length; j++) {
      result.push(Object.assign({}, tasks[j], { catKey: catKey }));
    }
  }
  return result;
}

function isDone(id) { return !!(userData.done && userData.done[id]); }

function toggleDone(id) {
  userData.done = userData.done || {};
  if (userData.done[id]) { delete userData.done[id]; } else { userData.done[id] = true; }
  persistAll();
  render();
}

function toggleMilestone(i) {
  var m = finances.planMilestones.slice();
  m[i] = !m[i];
  finances.planMilestones = m;
  persistAll();
  render();
}

function adjustAudit(delta) {
  finances.femdomAudit = Math.min(650, Math.max(0, (finances.femdomAudit || 0) + delta));
  persistAll();
  render();
}

function updateFinance(key, val) {
  finances[key] = parseFloat(val) || 0;
}

function saveFinances() {
  persistAll();
  editingFin = false;
  render();
}

function addTask(catKey) {
  if (!newTaskText.trim()) return;
  var id = catKey + '_' + Date.now();
  userData.extraTasks = userData.extraTasks || {};
  userData.extraTasks[catKey] = userData.extraTasks[catKey] || [];
  userData.extraTasks[catKey].push({ id: id, text: newTaskText.trim(), priority: newTaskPriority });
  userData.done = userData.done || {};
  saveUserData(userData);
  newTaskText = '';
  addingTo = null;
  render();
}

function deleteTask(catKey, taskId) {
  // Only delete from extraTasks (user-added)
  if (userData.extraTasks && userData.extraTasks[catKey]) {
    userData.extraTasks[catKey] = userData.extraTasks[catKey].filter(function(t) { return t.id !== taskId; });
    saveUserData(userData);
  }
  render();
}

function showSaved() {
  var t = document.getElementById('savedToast');
  if (t) { t.classList.add('show'); setTimeout(function() { t.classList.remove('show'); }, 1500); }
}

function setView(v) {
  currentView = v;
  var btns = ['all','urgent','week','schedule','done'];
  for (var i = 0; i < btns.length; i++) {
    var b = document.getElementById('nav-' + btns[i]);
    if (b) b.className = 'nav-btn' + (btns[i] === v ? ' active' : '');
  }
  render();
}

function showConfirm() { confirmingReset = true; render(); }
function hideConfirm() { confirmingReset = false; render(); }
function doCheckin() {
  userData.done = {};
  persistAll();
  confirmingReset = false;
  render();
}

function updateBadges() {
  var tasks = allTasks();
  var doneCount = tasks.filter(function(t) { return isDone(t.id); }).length;
  var urgentCount = tasks.filter(function(t) { return t.priority === 'urgent' && !isDone(t.id); }).length;
  var dc = document.getElementById('doneCount');
  var uc = document.getElementById('urgentCount');
  if (dc) dc.textContent = doneCount + ' done';
  if (uc) uc.textContent = urgentCount + ' urgent';
}

function fmt(n) { return '$' + Number(n || 0).toLocaleString('en-CA', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function pct(cur, goal) { return Math.min(100, Math.round((cur / goal) * 100)); }

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  updateBadges();
  var checkinWrap = document.getElementById('checkinWrap');
  var confirmWrap = document.getElementById('confirmWrap');
  if (checkinWrap) checkinWrap.style.display = confirmingReset ? 'none' : 'block';
  if (confirmWrap) confirmWrap.style.display = confirmingReset ? 'flex' : 'none';

  var el = document.getElementById('mainContent');
  if (!el) return;

  var html = '';

  if (currentView === 'week') {
    html += renderWeek();
  } else if (currentView === 'schedule') {
    html += renderSchedule();
  } else if (currentView === 'urgent') {
    html += renderUrgent();
  } else if (currentView === 'done') {
    html += renderDone();
  } else {
    html += renderAll();
  }

  el.innerHTML = html;
  attachEvents();
}

function renderSchedule() {
  var html = '';
  for (var i = 0; i < SCHEDULE.length; i++) {
    var s = SCHEDULE[i];
    html += '<div class="sched-item' + (i===0?' first':'') + '">';
    html += '<div class="sched-day">' + esc(s.day) + '</div>';
    html += '<div class="sched-detail">' + esc(s.detail) + '</div>';
    html += '</div>';
  }
  return html;
}

function renderUrgent() {
  var tasks = allTasks().filter(function(t) { return t.priority === 'urgent' && !isDone(t.id); });
  var html = '<div style="font-size:10px;color:#ff4444;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px">' + tasks.length + ' items need attention</div>';
  if (!tasks.length) return html + '<div style="text-align:center;color:#333;padding:40px 0;font-size:12px">✨ Nothing urgent</div>';
  for (var i = 0; i < tasks.length; i++) {
    html += renderTask(tasks[i]);
  }
  return html;
}

function renderDone() {
  var tasks = allTasks().filter(function(t) { return isDone(t.id); });
  var html = '<div style="font-size:10px;color:#555;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px">' + tasks.length + ' completed</div>';
  if (!tasks.length) return html + '<div style="text-align:center;color:#333;padding:40px 0;font-size:12px">Nothing done yet</div>';
  for (var i = 0; i < tasks.length; i++) {
    var t = tasks[i];
    html += '<div class="done-row" onclick="toggleDone(\'' + t.id + '\')">';
    html += '<div class="done-tick">✓</div>';
    html += '<div class="done-text">' + esc(t.text) + '</div>';
    html += '</div>';
  }
  return html;
}

function renderAll() {
  var html = renderFinances();
  html += renderProgress();

  var catKeys = Object.keys(CATEGORIES);
  for (var i = 0; i < catKeys.length; i++) {
    var catKey = catKeys[i];
    var section = CATEGORIES[catKey];
    var baseTasks = section.tasks.slice();
    var extra = userData.extraTasks[catKey] || [];
    var allCatTasks = baseTasks.concat(extra);
    var doneCount = allCatTasks.filter(function(t) { return isDone(t.id); }).length;
    var visibleTasks = showDone ? allCatTasks : allCatTasks.filter(function(t) { return !isDone(t.id); });
    var isCollapsed = collapsed[catKey];

    html += '<div style="margin-bottom:10px">';
    html += '<div class="cat-header" onclick="toggleCat(\'' + catKey + '\')">';
    html += '<span class="cat-label">' + esc(section.label) + '</span>';
    if (doneCount > 0) html += '<span class="cat-done-count">' + doneCount + ' done</span>';
    html += '<span class="cat-chevron">' + (isCollapsed ? '›' : '⌄') + '</span>';
    html += '</div>';

    if (!isCollapsed) {
      html += '<div class="cat-body">';
      for (var j = 0; j < visibleTasks.length; j++) {
        html += renderTask(visibleTasks[j], catKey);
      }

      if (addingTo === catKey) {
        html += '<div class="add-form">';
        html += '<input class="add-input" id="newTaskInput" type="text" placeholder="New task..." value="' + esc(newTaskText) + '" oninput="newTaskText=this.value" />';
        html += '<div class="priority-row">';
        var prs = ['urgent','high','med','low'];
        for (var p = 0; p < prs.length; p++) {
          var pr = prs[p];
          var sel = newTaskPriority === pr ? ('selected-' + pr) : 'unselected';
          html += '<button class="pr-btn ' + sel + '" onclick="newTaskPriority=\'' + pr + '\';render()">' + pr + '</button>';
        }
        html += '</div>';
        html += '<div class="form-btns">';
        html += '<button class="btn-add" onclick="addTask(\'' + catKey + '\')">Add</button>';
        html += '<button class="btn-cancel" onclick="addingTo=null;render()">Cancel</button>';
        html += '</div></div>';
      } else {
        html += '<button class="btn-add-task" onclick="addingTo=\'' + catKey + '\';render()">+ Add task</button>';
      }
      html += '</div>';
    }
    html += '</div>';
  }

  html += '<div style="text-align:center;margin-top:8px">';
  html += '<button class="show-done-btn" onclick="showDone=!showDone;render()">' + (showDone ? 'Hide' : 'Show') + ' completed</button>';
  html += '</div>';
  return html;
}

function renderTask(t, catKey) {
  var p = P[t.priority] || P.low;
  var done = isDone(t.id);
  var canDelete = catKey && userData.extraTasks && userData.extraTasks[catKey] && userData.extraTasks[catKey].some(function(e) { return e.id === t.id; });
  var html = '<div class="task-row ' + p.cls + '">';
  html += '<div class="task-check' + (done?' done-check':'') + '" onclick="toggleDone(\'' + t.id + '\')">' + (done?'✓':'') + '</div>';
  html += '<span class="task-text' + (done?' done-text':'') + '">' + esc(t.text) + '</span>';
  html += '<div class="task-meta">';
  html += '<span class="task-priority ' + p.dot + '" style="background:' + getBg(t.priority) + '">' + p.label + '</span>';
  if (canDelete) html += '<button class="task-del" onclick="deleteTask(\'' + catKey + '\',\'' + t.id + '\')">✕</button>';
  html += '</div></div>';
  return html;
}

function getBg(priority) {
  if (priority === 'urgent') return '#ff444415';
  if (priority === 'high') return '#ff6b9d15';
  if (priority === 'med') return '#c44dff15';
  return '#ffffff08';
}

function renderFinances() {
  var html = '<div class="card">';
  html += '<div class="card-title"><span>💰 Financial Snapshot</span><button class="edit-btn" onclick="editingFin=!editingFin;render()">' + (editingFin?'Done':'Edit') + '</button></div>';

  if (editingFin) {
    html += '<div class="fin-edit-grid">';
    var fields = [
      ['Scotia Chequing','business'],
      ['Scotia Savings','businessSavings'],
      ['TD Savings','tdSavings'],
      ['TD Chequing','tdChequing'],
      ['TD Credit Card','tdCredit'],
      ['Owed to BF','owedBoyfriend']
    ];
    for (var i = 0; i < fields.length; i++) {
      var label = fields[i][0], key = fields[i][1];
      html += '<div class="fin-edit-item"><label>' + label + '</label>';
      html += '<input type="number" value="' + (finances[key]||0) + '" onchange="updateFinance(\'' + key + '\',this.value)" /></div>';
    }
    html += '</div>';
    html += '<button onclick="saveFinances()" style="width:100%;padding:8px;border-radius:8px;background:linear-gradient(135deg,#ff6b9d,#c44dff);color:#fff;font-size:12px;margin-top:8px;border:none;cursor:pointer">Save Finances</button>';
  } else {
    html += '<div class="fin-grid">';
    var cells = [
      ['Scotia Chequing', fmt(finances.business), false],
      ['Scotia Savings', fmt(finances.businessSavings), false],
      ['Owed to BF', fmt(finances.owedBoyfriend), true],
      ['TD Credit', '-' + fmt(finances.tdCredit), true],
    ];
    for (var i = 0; i < cells.length; i++) {
      var cell = cells[i];
      html += '<div class="fin-cell' + (cell[2]?' debt':'') + '">';
      html += '<div class="fin-label">' + cell[0] + '</div>';
      html += '<div class="fin-val' + (cell[2]?' debt':'') + '">' + cell[1] + '</div>';
      html += '</div>';
    }
    html += '</div>';

    var bars = [
      ['TD Savings — Goal $10k', finances.tdSavings, finances.savingsGoal],
      ['TD Chequing — Goal $4k', finances.tdChequing, finances.chequingGoal],
      ['Scotia Chequing — Goal $80k', finances.business, finances.businessGoal],
    ];
    for (var i = 0; i < bars.length; i++) {
      var b = bars[i];
      var p2 = pct(b[1], b[2]);
      html += '<div class="prog-wrap">';
      html += '<div class="prog-header"><span>' + b[0] + '</span><span class="prog-pct">' + p2 + '%</span></div>';
      html += '<div class="prog-track"><div class="prog-fill" style="width:' + p2 + '%"></div></div>';
      html += '</div>';
    }
  }
  html += '</div>';
  return html;
}

function renderProgress() {
  var html = '<div class="card">';
  html += '<div class="card-title">⚡ 9-Week Plan</div>';
  var m = finances.planMilestones || [];
  var doneM = m.filter(function(x) { return x; }).length;
  var progPct = pct(doneM, 18);
  html += '<div class="prog-wrap" style="margin-bottom:8px">';
  html += '<div class="prog-header"><span>' + doneM + '/18 milestones</span><span class="prog-pct">' + progPct + '%</span></div>';
  html += '<div class="prog-track"><div class="prog-fill" style="width:' + progPct + '%"></div></div>';
  html += '</div>';
  html += '<div class="milestone-grid">';
  for (var i = 0; i < 18; i++) {
    var done = m[i] || false;
    html += '<div class="milestone-dot' + (done?' done':'') + '" onclick="toggleMilestone(' + i + ')">' + (done?'✓':'') + '</div>';
  }
  html += '</div>';

  var auditPct = pct(finances.femdomAudit || 0, 650);
  html += '<div style="margin-top:12px">';
  html += '<div class="prog-header"><span>Femdom Audit</span><span class="prog-pct">' + (finances.femdomAudit||0) + '/650</span></div>';
  html += '<div class="prog-track" style="margin-bottom:8px"><div class="prog-fill" style="width:' + auditPct + '%"></div></div>';
  html += '<div class="audit-row">';
  html += '<span class="audit-count">' + (finances.femdomAudit||0) + ' <span style="font-size:12px;color:#555">/ 650 clips</span></span>';
  html += '<div class="audit-btns">';
  html += '<button class="audit-btn minus" onclick="adjustAudit(-1)">−</button>';
  html += '<button class="audit-btn plus" onclick="adjustAudit(1)">+</button>';
  html += '</div></div></div>';
  html += '</div>';
  return html;
}

function renderWeek() {
  var days = Object.keys(WEEK_EVENTS);
  var today = new Date();
  var todayStr = today.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
  var html2 = '<div style="font-size:9px;color:#c44dff66;letter-spacing:3px;text-transform:uppercase;margin-bottom:12px">Week of Jun 23</div>';
  for (var i = 0; i < days.length; i++) {
    var day = days[i];
    var events = WEEK_EVENTS[day];
    var isToday = todayStr.replace(',','') === day.replace(',','');
    html2 += '<div style="margin-bottom:10px;padding:12px 14px;border-radius:12px;background:' + (isToday ? 'linear-gradient(135deg,#1a0535,#0d0220)' : '#0a0610') + ';border:1px solid ' + (isToday ? '#ff6b9d44' : '#ffffff08') + '">';
    html2 += '<div style="font-size:11px;color:' + (isToday ? '#ff6b9d' : '#c44dff') + ';margin-bottom:6px;font-family:Georgia,serif">' + esc(day) + (isToday ? ' — TODAY' : '') + '</div>';
    for (var j = 0; j < events.length; j++) {
      html2 += '<div style="font-size:12px;color:#e0c0f8;padding:4px 0;border-top:1px solid #ffffff08;line-height:1.4">' + esc(events[j]) + '</div>';
    }
    html2 += '</div>';
  }
  return html2;
}

function attachEvents() {
  var inp = document.getElementById('newTaskInput');
  if (inp) { inp.focus(); inp.value = newTaskText; }
}

function toggleCat(key) { collapsed[key] = !collapsed[key]; render(); }

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
